name: Update daily metrics

on:
  schedule:
    - cron: '0 2 * * *' # 02:00 UTC = 07:00 Бишкек
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt

      # Ежедневные парсеры. Любая ошибка fetch/parse = non-zero exit = красный CI;
      # сайт продолжает показывать последний закоммиченный (валидный) JSON.
      # TODO: раскомментировать по мере готовности парсеров
      # - run: python scripts/parse_toktogul.py
      # - run: python scripts/parse_openaq.py
      - run: python parse_nbkr_rates.py
        working-directory: scripts

      - name: Commit refreshed data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --cached --quiet || git commit -m 'chore(data): daily refresh'
          git push
