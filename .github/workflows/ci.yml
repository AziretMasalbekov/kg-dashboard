name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-etl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      # exit code 5 = "no tests collected" — не считаем ошибкой, пока нет парсеров
      - run: python -m pytest || { rc=$?; [ "$rc" -eq 5 ] && echo "no tests yet" || exit "$rc"; }

  build-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
