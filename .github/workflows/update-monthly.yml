name: Update monthly NSC stats

on:
  schedule:
    - cron: '0 3 5 * *' # 5-е число каждого месяца, 03:00 UTC (НСК публикует с лагом)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt

      # Месячная статистика НСК (stat.gov.kg).
      # TODO: раскомментировать по мере готовности парсеров
      # - run: python scripts/parse_cpi.py
      - run: echo "no monthly parsers wired yet"

      - name: Commit refreshed data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --cached --quiet || git commit -m 'chore(data): monthly NSC refresh'
          git push
